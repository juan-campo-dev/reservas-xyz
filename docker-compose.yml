services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: reservas-db
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q ''SELECT 1'' -b || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q ''SELECT 1'' -b || exit 1',
        ]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  web:
    build: .
    container_name: reservas-web
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=ReservasXYZDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true"
      EmailSettings__SmtpServer: ${SMTP_SERVER:-smtp.gmail.com}
      EmailSettings__SmtpPort: ${SMTP_PORT:-587}
      EmailSettings__SenderName: ${SMTP_SENDER_NAME:-Reservas XYZ}
      EmailSettings__SenderEmail: ${SMTP_EMAIL:-noreply@example.com}
      EmailSettings__Password: ${SMTP_PASSWORD:-changeme}
    ports:
      - "5000:5000"

  nginx:
    image: nginx:alpine
    container_name: reservas-nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt:ro

  certbot:
    image: certbot/certbot
    container_name: reservas-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    depends_on:
      - nginx
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 6h & wait $${!}; certbot renew; done'"

volumes:
  sqldata:
  certbot-etc:
  certbot-var:
